<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - KinalApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body {
            background-color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image: radial-gradient(#4ECDC4 2px, transparent 2px);
            background-size: 30px 30px;
            background-color: var(--cream);
            z-index: 0; opacity: 0.3;
        }
        .registro-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 540px;
            padding: 20px;
        }
        .registro-brand { text-align: center; margin-bottom: 25px; }
        .registro-brand .brand-icon {
            width: 80px; height: 80px;
            background: var(--blue);
            border: 4px solid var(--border-color);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white;
            box-shadow: 6px 6px 0 var(--border-color);
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }
        .registro-brand h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.4rem; color: var(--blue);
            text-shadow: 3px 3px 0 white, 5px 5px 0 var(--green);
            letter-spacing: 2px; margin: 0;
        }
        .registro-brand p {
            font-family: 'Nunito', sans-serif;
            font-weight: 700; color: var(--blue-dark);
            margin: 4px 0 0;
        }
        .registro-card {
            background: white;
            border: 4px solid var(--border-color);
            box-shadow: 10px 10px 0 var(--border-color);
        }
        .registro-card::before {
            content: "";
            display: block; height: 12px;
            background: repeating-linear-gradient(
                90deg,
                var(--blue)   0px,  var(--blue)   40px,
                var(--green)  40px, var(--green)   80px,
                var(--yellow) 80px, var(--yellow)  120px,
                var(--orange) 120px, var(--orange) 160px,
                var(--pink)   160px, var(--pink)   200px,
                var(--purple) 200px, var(--purple) 240px
            );
        }
        .registro-card-header {
            background: var(--blue);
            padding: 20px 30px;
            border-bottom: 4px solid var(--border-color);
        }
        .registro-card-header h4 {
            font-family: 'Fredoka One', cursive;
            color: white; font-size: 1.5rem;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--border-color);
            margin: 0;
        }
        .registro-card-body { padding: 30px; }
        .alert-retro {
            background: #FF6B6B; color: white;
            border: 3px solid var(--border-color); border-radius: 0;
            box-shadow: 4px 4px 0 var(--border-color);
            font-family: 'Fredoka One', cursive;
            padding: 12px 18px; margin-bottom: 20px;
        }

        /* ── Selector de rol (3 opciones) ── */
        .rol-selector {
            display: flex; gap: 10px; margin-top: 6px;
        }
        .rol-option {
            flex: 1; position: relative;
        }
        .rol-option input[type="radio"] {
            position: absolute; opacity: 0; width: 0; height: 0;
        }
        .rol-option label {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 14px 8px;
            border: 3px solid var(--border-color);
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            font-size: 0.9rem; text-align: center;
            transition: all 0.2s ease;
            background: white;
            box-shadow: 3px 3px 0 var(--border-color);
        }
        .rol-option label i { font-size: 1.6rem; margin-bottom: 5px; }
        .rol-option label .rol-desc {
            font-family: 'Nunito', sans-serif;
            font-size: 0.68rem; font-weight: 600;
            color: #666; margin-top: 4px; line-height: 1.3;
        }
        /* USER */
        .rol-option.user label { color: var(--blue-dark); }
        .rol-option.user input:checked + label {
            background: var(--blue); color: white;
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 var(--border-color);
        }
        .rol-option.user input:checked + label .rol-desc { color: rgba(255,255,255,0.85); }
        /* VENDEDOR */
        .rol-option.vendedor label { color: var(--orange); }
        .rol-option.vendedor input:checked + label {
            background: var(--orange); color: white;
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 var(--border-color);
        }
        .rol-option.vendedor input:checked + label .rol-desc { color: rgba(255,255,255,0.85); }
        /* ADMIN */
        .rol-option.admin label { color: var(--purple); }
        .rol-option.admin input:checked + label {
            background: var(--purple); color: white;
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 var(--border-color);
        }
        .rol-option.admin input:checked + label .rol-desc { color: rgba(255,255,255,0.85); }

        /* Botones */
        .btn-crear {
            width: 100%; background: var(--blue); color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.15rem; padding: 14px;
            border: 3px solid var(--border-color); border-radius: 0;
            box-shadow: 5px 5px 0 var(--border-color);
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.2s ease; cursor: pointer;
        }
        .btn-crear:hover {
            background: var(--blue-dark);
            transform: translate(-3px,-3px);
            box-shadow: 8px 8px 0 var(--border-color); color: white;
        }
        .btn-volver {
            width: 100%; background: white; color: var(--blue-dark);
            font-family: 'Fredoka One', cursive;
            font-size: 1rem; padding: 12px;
            border: 3px solid var(--border-color); border-radius: 0;
            box-shadow: 4px 4px 0 var(--border-color);
            text-transform: uppercase; letter-spacing: 1px;
            text-decoration: none; display: block; text-align: center;
            transition: all 0.2s ease; margin-top: 10px;
        }
        .btn-volver:hover {
            background: var(--cream);
            transform: translate(-2px,-2px);
            box-shadow: 6px 6px 0 var(--border-color);
            color: var(--blue-dark);
        }
        .deco-icon {
            position: fixed; font-size: 2.2rem;
            opacity: 0.15; animation: float 4s ease-in-out infinite;
            z-index: 0; pointer-events: none;
        }
        .deco-icon:nth-child(1) { top: 10%; left: 6%;   animation-delay: 0s; }
        .deco-icon:nth-child(2) { top: 20%; right: 8%;  animation-delay: 0.6s; }
        .deco-icon:nth-child(3) { top: 50%; left: 4%;   animation-delay: 1.1s; }
        .deco-icon:nth-child(4) { top: 75%; right: 6%;  animation-delay: 0.3s; }
        .deco-icon:nth-child(5) { bottom: 10%; left: 8%; animation-delay: 1.7s; }
        .deco-icon:nth-child(6) { bottom: 15%; right: 9%;animation-delay: 0.8s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%       { transform: translateY(-16px) rotate(5deg); }
        }
        .footer-registro {
            text-align: center; margin-top: 18px;
            font-family: 'Fredoka One', cursive;
            color: var(--blue-dark); font-size: 0.85rem;
            opacity: 0.65; position: relative; z-index: 1;
        }
    </style>
</head>
<body>

<span class="deco-icon">👤</span>
<span class="deco-icon">✨</span>
<span class="deco-icon">🛒</span>
<span class="deco-icon">⭐</span>
<span class="deco-icon">🚀</span>
<span class="deco-icon">🎯</span>

<div class="registro-wrapper">

    <div class="registro-brand">
        <div class="brand-icon"><i class="bi bi-person-plus-fill"></i></div>
        <h1>KinalApp</h1>
        <p>Crear cuenta nueva ✨</p>
    </div>

    <div class="registro-card">
        <div class="registro-card-header">
            <h4><i class="bi bi-person-badge me-2"></i>Registro</h4>
        </div>
        <div class="registro-card-body">

            <div class="alert-retro" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/registro}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person-fill me-1"></i>Username
                    </label>
                    <input type="text" class="form-control" id="username"
                           name="username" placeholder="Elige un nombre de usuario"
                           required autofocus>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope-fill me-1"></i>Email
                    </label>
                    <input type="email" class="form-control" id="email"
                           name="email" placeholder="tu@email.com" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-key-fill me-1"></i>Contraseña
                    </label>
                    <input type="password" class="form-control" id="password"
                           name="password" placeholder="Mínimo 6 caracteres"
                           minlength="6" required>
                </div>

                <!-- Selector de Rol: USER · VENDEDOR · ADMIN -->
                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-shield-fill me-1"></i>¿Cuál es tu rol?
                    </label>
                    <div class="rol-selector">

                        <div class="rol-option user">
                            <input type="radio" id="rolUser" name="rol" value="USER" checked>
                            <label for="rolUser">
                                <i class="bi bi-person-circle"></i>
                                Usuario
                                <span class="rol-desc">Clientes y productos</span>
                            </label>
                        </div>

                        <div class="rol-option vendedor">
                            <input type="radio" id="rolVendedor" name="rol" value="VENDEDOR">
                            <label for="rolVendedor">
                                <i class="bi bi-bag-fill"></i>
                                Vendedor
                                <span class="rol-desc">Ventas y detalles</span>
                            </label>
                        </div>

                        <div class="rol-option admin">
                            <input type="radio" id="rolAdmin" name="rol" value="ADMIN">
                            <label for="rolAdmin">
                                <i class="bi bi-shield-lock-fill"></i>
                                Admin
                                <span class="rol-desc">Acceso completo</span>
                            </label>
                        </div>

                    </div>
                </div>

                <button type="submit" class="btn-crear">
                    <i class="bi bi-person-check-fill me-2"></i>Crear mi cuenta
                </button>
            </form>

            <a th:href="@{/login}" class="btn-volver">
                <i class="bi bi-arrow-left me-2"></i>Ya tengo cuenta, iniciar sesión
            </a>
        </div>
    </div>

    <div class="footer-registro">
        &copy; 2026 KinalApp — Todos los derechos reservados
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
