<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Formulario Producto</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0"><i class="bi bi-box-seam me-2"></i><span th:text="${titulo}">Nuevo Producto</span></h4>
                        </div>
                        <div class="card-body">
                            <form th:action="${accion == 'guardar'} ? @{/productos/vista/guardar} : @{/productos/vista/actualizar/{codigo}(codigo=${producto.codigoProducto})}"
                                  th:object="${producto}"
                                  method="post">

                                <div class="mb-3">
                                    <label for="nombreProducto" class="form-label">Nombre del Producto</label>
                                    <input type="text"
                                           class="form-control"
                                           id="nombreProducto"
                                           th:field="*{nombreProducto}"
                                           required
                                           placeholder="Ingrese el nombre">
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="precio" class="form-label">Precio (Q)</label>
                                        <input type="number"
                                               step="0.01"
                                               class="form-control"
                                               id="precio"
                                               th:field="*{precio}"
                                               required
                                               placeholder="0.00">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="stock" class="form-label">Stock</label>
                                        <input type="number"
                                               class="form-control"
                                               id="stock"
                                               th:field="*{stock}"
                                               required
                                               placeholder="0">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="estado" class="form-label">Estado</label>
                                    <select class="form-select" id="estado" th:field="*{estado}">
                                        <option value="1">Activo</option>
                                        <option value="0">Inactivo</option>
                                    </select>
                                </div>

                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-2"></i>
                                        <span th:text="${accion == 'guardar'} ? 'Guardar' : 'Actualizar'">Guardar</span>
                                    </button>
                                    <a th:href="@{/productos/vista}" class="btn btn-secondary">
                                        <i class="bi bi-x-circle me-2"></i>Cancelar
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
