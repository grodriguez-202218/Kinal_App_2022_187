<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Productos</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-0"><i class="bi bi-box-seam me-3"></i><span th:text="${titulo}">Lista de Productos</span></h2>
                </div>
                <a th:href="@{/productos/vista/nuevo}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-2"></i>Nuevo Producto
                </a>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="producto : ${productos}" th:if="${!#lists.isEmpty(productos)}">
                                <td th:text="${producto.codigoProducto}">1</td>
                                <td th:text="${producto.nombreProducto}">Producto</td>
                                <td th:text="'Q' + ${producto.precio}">Q100.00</td>
                                <td th:text="${producto.stock}">50</td>
                                <td>
                                    <span th:class="${producto.estado == 1} ? 'badge bg-success' : 'badge bg-danger'"
                                          th:text="${producto.estado == 1} ? 'Activo' : 'Inactivo'">
                                        Activo
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/productos/vista/editar/{codigo}(codigo=${producto.codigoProducto})}"
                                       class="btn btn-sm btn-warning me-1">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/productos/vista/eliminar/{codigo}(codigo=${producto.codigoProducto})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('¿Eliminar este producto?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(productos)}">
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <i class="bi bi-inbox display-6"></i>
                                    <p class="mt-2">No hay productos registrados</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-3">
                <a th:href="@{/}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
                </a>
            </div>
        </div>
    </div>
</body>
</html>
