<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Usuarios</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">

        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">
                <i class="bi bi-people me-3"></i>
                <span th:text="${titulo}">Lista de Usuarios</span>
            </h2>
            <a th:href="@{/usuarios/vista/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle me-2"></i>Nuevo Usuario
            </a>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${exito}" class="alert border-0 mb-3"
             style="background:#70E000;color:#2D1B4E;border-left:4px solid #2D1B4E !important;
                    font-family:'Fredoka One',cursive;padding:12px 16px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${exito}"></span>
        </div>
        <div th:if="${error}" class="alert border-0 mb-3"
             style="background:#FF6B6B;color:#fff;border-left:4px solid #2D1B4E !important;
                    font-family:'Fredoka One',cursive;padding:12px 16px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}" th:if="${!#lists.isEmpty(usuarios)}">
                        <td th:text="${usuario.codigoUsuario}">1</td>
                        <td th:text="${usuario.username}">usuario</td>
                        <td th:text="${usuario.email}">email@test.com</td>
                        <td>
                                <span th:class="${usuario.rol == 'ADMIN'} ? 'badge bg-info' :
                                               (${usuario.rol == 'VENDEDOR'} ? 'badge bg-primary' :
                                               'badge bg-warning')"
                                      th:text="${usuario.rol}">ADMIN</span>
                        </td>
                        <td>
                                <span th:class="${usuario.estado == 1} ? 'badge bg-success' : 'badge bg-danger'"
                                      th:text="${usuario.estado == 1} ? 'Activo' : 'Inactivo'">
                                    Activo
                                </span>
                        </td>
                        <td>
                            <a th:href="@{/usuarios/vista/editar/{codigo}(codigo=${usuario.codigoUsuario})}"
                               class="btn btn-sm btn-warning me-1">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/usuarios/vista/eliminar/{codigo}(codigo=${usuario.codigoUsuario})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Eliminar este usuario?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="6" class="text-center py-4">
                            <i class="bi bi-inbox display-6"></i>
                            <p class="mt-2">No hay usuarios registrados</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
            </a>
        </div>
    </div>
</div>
</body>
</html>
