<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Formulario Cliente</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0" th:text="${titulo}">Nuevo Cliente</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${accion == 'guardar'} ? @{/clientes/vista/guardar} : @{/clientes/vista/actualizar/{dpi}(dpi=${cliente.DPICliente})}"
                              th:object="${cliente}"
                              method="post">

                            <div class="mb-3">
                                <label for="dpiCliente" class="form-label">DPI</label>
                                <input type="number"
                                       class="form-control"
                                       id="dpiCliente"
                                       th:field="*{DPICliente}"
                                       th:readonly="${accion == 'actualizar'}"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="nombreCliente" class="form-label">Nombre</label>
                                <input type="text"
                                       class="form-control"
                                       id="nombreCliente"
                                       th:field="*{nombreCliente}"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="apellidoCliente" class="form-label">Apellido</label>
                                <input type="text"
                                       class="form-control"
                                       id="apellidoCliente"
                                       th:field="*{apellidoCliente}"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="direccion" class="form-label">Dirección</label>
                                <input type="text"
                                       class="form-control"
                                       id="direccion"
                                       th:field="*{direccion}"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="estado" class="form-label">Estado</label>
                                <select class="form-select" id="estado" th:field="*{estado}">
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <span th:text="${accion == 'guardar'} ? 'Guardar' : 'Actualizar'">Guardar</span>
                                </button>
                                <a th:href="@{/clientes/vista}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
