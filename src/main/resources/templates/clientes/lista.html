<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Clientes</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">

        <!-- Page Header -->
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">
                <i class="bi bi-people me-3"></i>
                <span th:text="${titulo}">Lista de Clientes</span>
            </h2>
            <a th:href="@{/clientes/vista/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle me-2"></i>Nuevo Cliente
            </a>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${exito}" class="alert alert-success border-0 mb-3"
             style="background:#70E000;color:#2D1B4E;border-left:4px solid #2D1B4E !important;
                    font-family:'Fredoka One',cursive;padding:12px 16px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${exito}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger border-0 mb-3"
             style="background:#FF6B6B;color:#fff;border-left:4px solid #2D1B4E !important;
                    font-family:'Fredoka One',cursive;padding:12px 16px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>DPI</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Dirección</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cliente : ${clientes}" th:if="${!#lists.isEmpty(clientes)}">
                        <td th:text="${cliente.DPICliente}">123</td>
                        <td th:text="${cliente.nombreCliente}">Juan</td>
                        <td th:text="${cliente.apellidoCliente}">Pérez</td>
                        <td th:text="${cliente.direccion}">Ciudad</td>
                        <td>
                                <span th:class="${cliente.estado == 1} ? 'badge bg-success' : 'badge bg-danger'"
                                      th:text="${cliente.estado == 1} ? 'Activo' : 'Inactivo'">
                                    Activo
                                </span>
                        </td>
                        <td>
                            <!-- Editar: USER, VENDEDOR, ADMIN -->
                            <a th:href="@{/clientes/vista/editar/{dpi}(dpi=${cliente.DPICliente})}"
                               class="btn btn-sm btn-warning me-1">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <!-- Eliminar: SOLO ADMIN -->
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/clientes/vista/eliminar/{dpi}(dpi=${cliente.DPICliente})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Estás seguro de eliminar este cliente?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" class="text-center py-4">
                            <i class="bi bi-inbox display-6"></i>
                            <p class="mt-2">No hay clientes registrados</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
            </a>
        </div>
    </div>
</div>
</body>
</html>
