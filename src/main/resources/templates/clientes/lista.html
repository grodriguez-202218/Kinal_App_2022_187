<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Clientes</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${titulo}">Lista de Clientes</h2>
            <a th:href="@{/clientes/vista/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nuevo Cliente
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>DPI</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Dirección</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cliente : ${clientes}" th:if="${!#lists.isEmpty(clientes)}">
                                <td th:text="${cliente.DPICliente}">123456789</td>
                                <td th:text="${cliente.nombreCliente}">Juan</td>
                                <td th:text="${cliente.apellidoCliente}">Pérez</td>
                                <td th:text="${cliente.direccion}">Ciudad</td>
                                <td>
                                    <span th:class="${cliente.estado == 1} ? 'badge bg-success' : 'badge bg-danger'"
                                          th:text="${cliente.estado == 1} ? 'Activo' : 'Inactivo'">
                                        Activo
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/clientes/vista/editar/{dpi}(dpi=${cliente.DPICliente})}"
                                       class="btn btn-sm btn-warning me-1">Editar</a>
                                    <a th:href="@{/clientes/vista/eliminar/{dpi}(dpi=${cliente.DPICliente})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('¿Estás seguro de eliminar este cliente?')">Eliminar</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(clientes)}">
                                <td colspan="6" class="text-center">No hay clientes registrados</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
