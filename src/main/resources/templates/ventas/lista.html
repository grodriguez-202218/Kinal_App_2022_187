<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${titulo}">Ventas</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">

        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 class="mb-0">
                <i class="bi bi-cart me-3"></i>
                <span th:text="${titulo}">Lista de Ventas</span>
            </h2>
            <a th:href="@{/ventas/vista/nuevo}" class="btn btn-success">
                <i class="bi bi-plus-circle me-2"></i>Nueva Venta
            </a>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${exito}" class="alert border-0 mb-3"
             style="background:#70E000;color:#2D1B4E;border-left:4px solid #2D1B4E !important;
                    font-family:'Fredoka One',cursive;padding:12px 16px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${exito}"></span>
        </div>
        <div th:if="${error}" class="alert border-0 mb-3"
             style="background:#FF6B6B;color:#fff;border-left:4px solid #2D1B4E !important;
                    font-family:'Fredoka One',cursive;padding:12px 16px;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Usuario</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="venta : ${ventas}" th:if="${!#lists.isEmpty(ventas)}">
                        <td th:text="${venta.codigoVenta}">1</td>
                        <td th:text="${venta.fechaVenta}">2024-01-01</td>
                        <td th:text="${venta.cliente} != null ?
                                ${venta.cliente.nombreCliente} + ' ' + ${venta.cliente.apellidoCliente}
                                : 'N/A'">Cliente</td>
                        <td th:text="${venta.usuario} != null ? ${venta.usuario.username} : 'N/A'">Usuario</td>
                        <td th:text="'Q' + ${venta.total}">Q100.00</td>
                        <td>
                                <span th:class="${venta.estado == 1} ? 'badge bg-success' : 'badge bg-danger'"
                                      th:text="${venta.estado == 1} ? 'Activa' : 'Anulada'">
                                    Activa
                                </span>
                        </td>
                        <td>
                            <!-- Editar: VENDEDOR y ADMIN -->
                            <a th:href="@{/ventas/vista/editar/{codigo}(codigo=${venta.codigoVenta})}"
                               class="btn btn-sm btn-warning me-1">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <!-- Eliminar: SOLO ADMIN -->
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/ventas/vista/eliminar/{codigo}(codigo=${venta.codigoVenta})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Eliminar esta venta?')">
                                <i class="bi bi-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ventas)}">
                        <td colspan="7" class="text-center py-4">
                            <i class="bi bi-inbox display-6"></i>
                            <p class="mt-2">No hay ventas registradas</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-2"></i>Volver al Inicio
            </a>
        </div>
    </div>
</div>
</body>
</html>
