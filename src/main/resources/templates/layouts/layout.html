<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - KinalApp">KinalApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-shop"></i>
            KinalApp
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">

                <!-- INICIO: todos los roles autenticados -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>Inicio
                    </a>
                </li>

                <!-- CLIENTES: USER, VENDEDOR y ADMIN -->
                <li class="nav-item" sec:authorize="hasAnyRole('USER','VENDEDOR','ADMIN')">
                    <a class="nav-link" th:href="@{/clientes/vista}">
                        <i class="bi bi-people me-1"></i>Clientes
                    </a>
                </li>

                <!-- PRODUCTOS: USER, VENDEDOR y ADMIN -->
                <li class="nav-item" sec:authorize="hasAnyRole('USER','VENDEDOR','ADMIN')">
                    <a class="nav-link" th:href="@{/productos/vista}">
                        <i class="bi bi-box-seam me-1"></i>Productos
                    </a>
                </li>

                <!-- VENTAS: solo VENDEDOR y ADMIN -->
                <li class="nav-item" sec:authorize="hasAnyRole('VENDEDOR','ADMIN')">
                    <a class="nav-link" th:href="@{/ventas/vista}">
                        <i class="bi bi-cart me-1"></i>Detalle de Ventas
                    </a>
                </li>

                <!-- USUARIOS: solo ADMIN -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios/vista}">
                        <i class="bi bi-person-workspace me-1"></i>Usuarios
                    </a>
                </li>

            </ul>

            <!-- Info del usuario autenticado -->
            <ul class="navbar-nav ms-auto align-items-center" sec:authorize="isAuthenticated()">

                <!-- Badge de rol -->
                <li class="nav-item me-2">
                    <span style="
                        font-family: 'Fredoka One', cursive;
                        background: var(--yellow);
                        color: var(--border-color);
                        border: 2px solid var(--border-color);
                        padding: 4px 12px;
                        font-size: 0.8rem;
                        box-shadow: 2px 2px 0 var(--border-color);
                        text-transform: uppercase;
                        letter-spacing: 1px;"
                          th:text="${#authentication.getPrincipal().getAuthorities()[0].getAuthority().replace('ROLE_','')}">
                        ROL
                    </span>
                </li>

                <!-- Nombre de usuario -->
                <li class="nav-item me-3">
                    <span style="
                        font-family: 'Fredoka One', cursive;
                        color: white;
                        font-size: 1rem;
                        text-transform: uppercase;
                        letter-spacing: 1px;">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">usuario</span>
                    </span>
                </li>

                <!-- Botón cerrar sesión -->
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" style="
                            font-family: 'Fredoka One', cursive;
                            background: var(--blue-dark);
                            color: white;
                            border: 2px solid white;
                            padding: 8px 20px;
                            font-size: 0.9rem;
                            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            cursor: pointer;
                            transition: all 0.2s ease;"
                                onmouseover="this.style.transform='translate(-2px,-2px)';this.style.boxShadow='5px 5px 0 rgba(0,0,0,0.3)'"
                                onmouseout="this.style.transform='';this.style.boxShadow='3px 3px 0 rgba(0,0,0,0.3)'">
                            <i class="bi bi-box-arrow-right me-1"></i>Salir
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div layout:fragment="content">
    </div>
</main>

<footer>
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 KinalApp - Gestión de Clientes</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
