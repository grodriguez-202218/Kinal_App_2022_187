<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - KinalApp">KinalApp</title>
    <!-- Google Fonts - Retro Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Custom CSS Retro -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-shop"></i>
            KinalApp
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Links de navegación -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clientes/vista}">
                        <i class="bi bi-people me-1"></i>Clientes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/productos/vista}">
                        <i class="bi bi-box-seam me-1"></i>Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ventas/vista}">
                        <i class="bi bi-cart me-1"></i>Ventas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios/vista}">
                        <i class="bi bi-person-workspace me-1"></i>Usuarios
                    </a>
                </li>
            </ul>

            <!-- Usuario logueado + Logout -->
            <ul class="navbar-nav ms-auto align-items-center" th:if="${session.usuarioLogueado != null}">
                <!-- Rol badge -->
                <li class="nav-item me-2">
                        <span style="
                            font-family: 'Fredoka One', cursive;
                            background: var(--yellow);
                            color: var(--border-color);
                            border: 2px solid var(--border-color);
                            padding: 4px 12px;
                            font-size: 0.8rem;
                            box-shadow: 2px 2px 0 var(--border-color);
                            text-transform: uppercase;
                            letter-spacing: 1px;
                        " th:text="${session.rolLogueado}">ROL</span>
                </li>
                <!-- Nombre de usuario -->
                <li class="nav-item me-3">
                        <span style="
                            font-family: 'Fredoka One', cursive;
                            color: white;
                            font-size: 1rem;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                        ">
                            <i class="bi bi-person-circle me-1"></i>
                            <span th:text="${session.usernameLogueado}">usuario</span>
                        </span>
                </li>
                <!-- Botón cerrar sesión -->
                <li class="nav-item">
                    <a th:href="@{/logout}" style="
                            font-family: 'Fredoka One', cursive;
                            background: var(--blue-dark);
                            color: white;
                            border: 2px solid white;
                            padding: 8px 20px;
                            font-size: 0.9rem;
                            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            text-decoration: none;
                            display: inline-block;
                            transition: all 0.2s ease;
                        "
                       onmouseover="this.style.transform='translate(-2px,-2px)';this.style.boxShadow='5px 5px 0 rgba(0,0,0,0.3)'"
                       onmouseout="this.style.transform='';this.style.boxShadow='3px 3px 0 rgba(0,0,0,0.3)'">
                        <i class="bi bi-box-arrow-right me-1"></i>Salir
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div layout:fragment="content">
    </div>
</main>

<footer>
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 KinalApp - Gestión de Clientes</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
