<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KinalApp</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        body {
            background-color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo animado con puntos */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(#FF6B9D 2px, transparent 2px);
            background-size: 30px 30px;
            background-color: var(--cream);
            z-index: 0;
            opacity: 0.35;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        /* Logo / marca arriba */
        .login-brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-brand .brand-icon {
            width: 90px;
            height: 90px;
            background: var(--orange);
            border: 4px solid var(--border-color);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 6px 6px 0 var(--border-color);
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .login-brand h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.8rem;
            color: var(--blue);
            text-shadow: 3px 3px 0 white, 5px 5px 0 var(--orange);
            letter-spacing: 3px;
            margin: 0;
        }

        .login-brand p {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: var(--blue-dark);
            margin: 5px 0 0;
        }

        /* Card del formulario */
        .login-card {
            background: white;
            border: 4px solid var(--border-color);
            box-shadow: 10px 10px 0 var(--border-color);
            padding: 0;
            position: relative;
        }

        /* Cinta de colores arriba de la card */
        .login-card::before {
            content: "";
            display: block;
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                var(--orange)   0px,  var(--orange)   40px,
                var(--yellow)   40px, var(--yellow)    80px,
                var(--green)    80px, var(--green)     120px,
                var(--blue)     120px, var(--blue)     160px,
                var(--pink)     160px, var(--pink)     200px,
                var(--purple)   200px, var(--purple)   240px
            );
        }

        .login-card-header {
            background: var(--orange);
            padding: 20px 30px;
            border-bottom: 4px solid var(--border-color);
        }

        .login-card-header h4 {
            font-family: 'Fredoka One', cursive;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--border-color);
            margin: 0;
        }

        .login-card-body {
            padding: 30px;
        }

        /* Alerta de error */
        .alert-retro {
            background: #FF6B6B;
            color: white;
            border: 3px solid var(--border-color);
            border-radius: 0;
            box-shadow: 4px 4px 0 var(--border-color);
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            letter-spacing: 0.5px;
            padding: 12px 18px;
            margin-bottom: 20px;
        }

        /* Alerta de logout exitoso */
        .alert-success-retro {
            background: var(--green);
            color: var(--border-color);
            border: 3px solid var(--border-color);
            border-radius: 0;
            box-shadow: 4px 4px 0 var(--border-color);
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            letter-spacing: 0.5px;
            padding: 12px 18px;
            margin-bottom: 20px;
        }

        /* Botón submit */
        .btn-login {
            width: 100%;
            background: var(--orange);
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            padding: 14px;
            border: 3px solid var(--border-color);
            border-radius: 0;
            box-shadow: 5px 5px 0 var(--border-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-login:hover {
            background: var(--orange-dark);
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0 var(--border-color);
            color: white;
        }

        .btn-login:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--border-color);
        }

        /* Iconos decorativos flotantes */
        .deco-icon {
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.18;
            animation: float 4s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .deco-icon:nth-child(1)  { top: 8%;  left: 5%;  animation-delay: 0s; }
        .deco-icon:nth-child(2)  { top: 15%; right: 7%; animation-delay: 0.7s; }
        .deco-icon:nth-child(3)  { top: 45%; left: 3%;  animation-delay: 1.2s; }
        .deco-icon:nth-child(4)  { top: 70%; right: 5%; animation-delay: 0.4s; }
        .deco-icon:nth-child(5)  { bottom: 8%; left: 10%;animation-delay: 1.8s; }
        .deco-icon:nth-child(6)  { bottom: 12%; right: 8%;animation-delay: 0.9s;}
        .deco-icon:nth-child(7)  { top: 30%; left: 12%; animation-delay: 2s; }
        .deco-icon:nth-child(8)  { top: 60%; right: 12%;animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%       { transform: translateY(-18px) rotate(6deg); }
        }

        .footer-login {
            text-align: center;
            margin-top: 20px;
            font-family: 'Fredoka One', cursive;
            color: var(--blue-dark);
            font-size: 0.9rem;
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

<!-- Íconos decorativos de fondo -->
<span class="deco-icon">🛒</span>
<span class="deco-icon">⭐</span>
<span class="deco-icon">📦</span>
<span class="deco-icon">💰</span>
<span class="deco-icon">🏪</span>
<span class="deco-icon">✨</span>
<span class="deco-icon">🎯</span>
<span class="deco-icon">🚀</span>

<div class="login-wrapper">

    <!-- Marca / Logo -->
    <div class="login-brand">
        <div class="brand-icon">
            <i class="bi bi-shop"></i>
        </div>
        <h1>KinalApp</h1>
        <p>Sistema de Gestión (admin, 1234)✨</p>
    </div>

    <!-- Card de Login -->
    <div class="login-card">
        <div class="login-card-header">
            <h4><i class="bi bi-lock-fill me-2"></i>Iniciar Sesión</h4>
        </div>
        <div class="login-card-body">

            <!-- Mensaje de error -->
            <div class="alert-retro" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}">Error</span>
            </div>

            <!-- Mensaje de logout -->
            <div class="alert-success-retro" th:if="${param.logout}">
                <i class="bi bi-check-circle-fill me-2"></i>
                Sesión cerrada correctamente. ¡Hasta pronto!
            </div>

            <!-- Formulario -->
            <form th:action="@{/login}" method="post">

                <div class="mb-4">
                    <label for="username" class="form-label">
                        <i class="bi bi-person-fill me-1"></i>Username
                    </label>
                    <input type="text"
                           class="form-control"
                           id="username"
                           name="username"
                           placeholder="Ingresa tu usuario"
                           required
                           autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-key-fill me-1"></i>Contraseña
                    </label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-rocket-takeoff me-2"></i>¡Entrar!
                </button>

            </form>
        </div>
    </div>

    <div class="footer-login">
        &copy; 2026 KinalApp — Todos los derechos reservados
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
