<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KinalApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        :root {
            --cream:       #FFF5E6;
            --orange:      #FF6B35;
            --orange-dark: #E55A25;
            --yellow:      #FFD93D;
            --green:       #6BCB77;
            --blue:        #4D96FF;
            --blue-dark:   #1A3A6B;
            --pink:        #FF6B9D;
            --purple:      #C77DFF;
            --border-color:#1A1A2E;
        }

        * { box-sizing: border-box; }

        body {
            background-color: #FFF5E6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            font-family: 'Nunito', sans-serif;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image: radial-gradient(#FF6B9D 2px, transparent 2px);
            background-size: 30px 30px;
            background-color: #FFF5E6;
            z-index: 0; opacity: 0.3;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 460px;
            padding: 20px;
        }


        .login-brand { text-align: center; margin-bottom: 28px; }
        .brand-icon {
            width: 88px; height: 88px;
            background: #FF6B35;
            border: 4px solid #1A1A2E;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2.4rem; color: white;
            box-shadow: 6px 6px 0 #1A1A2E;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }
        .brand-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.6rem; color: #4D96FF;
            text-shadow: 3px 3px 0 white, 5px 5px 0 #FF6B35;
            letter-spacing: 3px; margin: 0;
        }
        .brand-sub {
            font-family: 'Nunito', sans-serif;
            font-weight: 700; color: #1A3A6B;
            margin: 4px 0 0; font-size: 0.95rem;
        }

        .login-card {
            background: white;
            border: 4px solid #1A1A2E;
            box-shadow: 10px 10px 0 #1A1A2E;
            overflow: hidden;
        }
        .card-rainbow {
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                #FF6B35 0px, #FF6B35 40px,
                #FFD93D 40px, #FFD93D 80px,
                #6BCB77 80px, #6BCB77 120px,
                #4D96FF 120px, #4D96FF 160px,
                #FF6B9D 160px, #FF6B9D 200px,
                #C77DFF 200px, #C77DFF 240px
            );
        }
        .card-header-retro {
            background: #FF6B35;
            padding: 18px 28px;
            border-bottom: 4px solid #1A1A2E;
        }
        .card-header-retro h4 {
            font-family: 'Fredoka One', cursive;
            color: white; font-size: 1.4rem;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 0 #1A1A2E;
            margin: 0;
        }
        .card-body-retro { padding: 28px; }

        .alert-error {
            background: #FF6B6B; color: white;
            border: 3px solid #1A1A2E; border-radius: 0;
            box-shadow: 4px 4px 0 #1A1A2E;
            font-family: 'Fredoka One', cursive;
            font-size: 0.95rem; padding: 12px 16px; margin-bottom: 18px;
        }
        .alert-success {
            background: #6BCB77; color: #1A1A2E;
            border: 3px solid #1A1A2E; border-radius: 0;
            box-shadow: 4px 4px 0 #1A1A2E;
            font-family: 'Fredoka One', cursive;
            font-size: 0.95rem; padding: 12px 16px; margin-bottom: 18px;
        }
        .alert-info {
            background: #4D96FF; color: white;
            border: 3px solid #1A1A2E; border-radius: 0;
            box-shadow: 4px 4px 0 #1A1A2E;
            font-family: 'Fredoka One', cursive;
            font-size: 0.95rem; padding: 12px 16px; margin-bottom: 18px;
        }

        .form-label {
            font-family: 'Fredoka One', cursive;
            font-size: 0.95rem; color: #1A3A6B;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .form-control {
            border: 2px solid #1A1A2E; border-radius: 0;
            font-family: 'Nunito', sans-serif; font-size: 1rem;
            padding: 10px 14px;
        }
        .form-control:focus {
            border-color: #FF6B35;
            box-shadow: 3px 3px 0 #FF6B35;
            outline: none;
        }

        .btn-login {
            width: 100%; background: #FF6B35; color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.15rem; padding: 13px;
            border: 3px solid #1A1A2E; border-radius: 0;
            box-shadow: 5px 5px 0 #1A1A2E;
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.15s ease; cursor: pointer;
            display: block;
        }
        .btn-login:hover {
            background: #E55A25;
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0 #1A1A2E; color: white;
        }
        .btn-login:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #1A1A2E;
        }
        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 18px 0;
            font-family: 'Fredoka One', cursive;
            color: #aaa; font-size: 0.82rem;
        }
        .divider::before, .divider::after {
            content: ""; flex: 1; height: 2px; background: #e0e0e0;
        }
        .btn-registro {
            width: 100%; background: white; color: #1A3A6B;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem; padding: 12px;
            border: 3px solid #1A1A2E; border-radius: 0;
            box-shadow: 4px 4px 0 #1A1A2E;
            text-transform: uppercase; letter-spacing: 1px;
            text-decoration: none; display: block; text-align: center;
            transition: all 0.15s ease;
        }
        .btn-registro:hover {
            background: #FFF5E6;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #1A1A2E; color: #1A3A6B;
        }


        .deco-icon {
            position: fixed; font-size: 2.4rem;
            opacity: 0.16; animation: float 4s ease-in-out infinite;
            z-index: 0; pointer-events: none; user-select: none;
        }
        .deco-icon:nth-child(1) { top:8%;   left:5%;   animation-delay:0s;   }
        .deco-icon:nth-child(2) { top:15%;  right:7%;  animation-delay:0.7s; }
        .deco-icon:nth-child(3) { top:45%;  left:3%;   animation-delay:1.2s; }
        .deco-icon:nth-child(4) { top:70%;  right:5%;  animation-delay:0.4s; }
        .deco-icon:nth-child(5) { bottom:8%; left:10%; animation-delay:1.8s; }
        .deco-icon:nth-child(6) { bottom:12%;right:8%; animation-delay:0.9s; }
        .deco-icon:nth-child(7) { top:30%;  left:12%;  animation-delay:2s;   }
        .deco-icon:nth-child(8) { top:60%;  right:12%; animation-delay:1.5s; }

        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-16px) rotate(5deg); }
        }

        .footer-login {
            text-align: center; margin-top: 18px;
            font-family: 'Fredoka One', cursive;
            color: #1A3A6B; font-size: 0.85rem;
            opacity: 0.65; position: relative; z-index: 1;
        }
    </style>
</head>
<body>

<span class="deco-icon">🛒</span>
<span class="deco-icon">⭐</span>
<span class="deco-icon">📦</span>
<span class="deco-icon">💰</span>
<span class="deco-icon">🏪</span>
<span class="deco-icon">✨</span>
<span class="deco-icon">🎯</span>
<span class="deco-icon">🚀</span>

<div class="login-wrapper">

    <div class="login-brand">
        <div class="brand-icon"><i class="bi bi-shop"></i></div>
        <h1 class="brand-title">KinalApp</h1>
        <p class="brand-sub">Sistema de Gestión (admin, 123456)</p>
    </div>

    <div class="login-card">
        <div class="card-rainbow"></div>
        <div class="card-header-retro">
            <h4><i class="bi bi-lock-fill me-2"></i>Iniciar Sesión</h4>
        </div>
        <div class="card-body-retro">

            <div class="alert-error" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}">Error</span>
            </div>

            <div class="alert-success" th:if="${logoutMsg}">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${logoutMsg}">Sesión cerrada</span>
            </div>

            <div class="alert-info" th:if="${registradoMsg}">
                <i class="bi bi-person-check-fill me-2"></i>
                <span th:text="${registradoMsg}">Cuenta creada</span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person-fill me-1"></i>Username
                    </label>
                    <input type="text" class="form-control"
                           id="username" name="username"
                           placeholder="Ingresa tu usuario"
                           required autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-key-fill me-1"></i>Contraseña
                    </label>
                    <input type="password" class="form-control"
                           id="password" name="password"
                           placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-rocket-takeoff me-2"></i>¡Entrar!
                </button>
            </form>

            <!-- Separador -->
            <div class="divider">¿No tienes cuenta?</div>

            <!-- Ir a registro -->
            <a th:href="@{/registro}" class="btn-registro">
                <i class="bi bi-person-plus-fill me-2"></i>Crear cuenta nueva
            </a>

        </div>
    </div>

    <div class="footer-login">
        &copy; 2026 KinalApp — Todos los derechos reservados
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
